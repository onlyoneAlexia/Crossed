    <rect x="368" y="38" width="52" height="6" fill="#FDF6E3" opacity=".16"/>
    <rect x="360" y="50" width="22" height="6" fill="#FDF6E3" opacity=".18"/>
    <rect x="392" y="50" width="28" height="6" fill="#FDF6E3" opacity=".18"/>
    <text class="sealed" x="392" y="62" font-size="18" fill="#FDF6E3">?</text>
    <g class="matched">
      <rect x="348" y="48" width="6" height="6" fill="#2BFF88"/>
      <rect x="354" y="54" width="6" height="6" fill="#2BFF88"/>
      <rect x="360" y="42" width="6" height="6" fill="#2BFF88"/>
