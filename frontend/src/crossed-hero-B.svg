<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 192" width="100%" role="img" aria-label="Crossed swap animation: sealed orders unlock, XLM and USDC cross through the center X, swap sides, and match" shape-rendering="crispEdges">
  <style>
    rect{shape-rendering:crispEdges}
    text{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:900}
    image{image-rendering:auto}
    #leftTrader{animation:trL 6s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%}
    #rightTrader{animation:trR 6s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%}
    #coinXLM{animation:xT 6s ease-in-out infinite}
    #coinUSDC{animation:uT 6s ease-in-out infinite}
    #coinXLM .coinFace,#coinUSDC .coinFace{animation:cFace 6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    #crossX{animation:xPulse 6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    #sparkA{animation:spkA 6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    #sparkB{animation:spkB 6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
    #coinXLM .shine,#coinUSDC .shine{animation:coinShine 6s steps(8,end) infinite}
    #matchCheck{animation:checkIn 6s cubic-bezier(.2,1.4,.35,1) infinite;transform-box:fill-box;transform-origin:center}
    #lockL .body,#lockR .body{animation:lockBody 6s steps(10,end) infinite}
    #lockL .shackle{animation:shackleL 6s ease-in-out infinite;transform-box:fill-box;transform-origin:32px 30px}
    #lockR .shackle{animation:shackleR 6s ease-in-out infinite;transform-box:fill-box;transform-origin:18px 30px}
    #leftTicket .sealed,#rightTicket .sealed{animation:sealedPulse 6s steps(8,end) infinite}
    #leftTicket .matched,#rightTicket .matched{animation:ticketMatched 6s steps(6,end) infinite}

    @keyframes xT{0%,12%{transform:translate(0,0)}50%{transform:translate(150px,-46px)}88%,100%{transform:translate(282px,-42px)}}
    @keyframes uT{0%,12%{transform:translate(0,0)}50%{transform:translate(-150px,46px)}88%,100%{transform:translate(-282px,42px)}}
    @keyframes cFace{0%,100%{transform:translateY(0) scaleX(1)}30%{transform:translateY(-3px) scaleX(1)}50%{transform:translateY(-1px) scaleX(.2)}70%{transform:translateY(3px) scaleX(1)}}
    @keyframes trL{0%,100%{transform:translate(0,0) rotate(0)}25%{transform:translate(0,-1.5px) rotate(-1.6deg)}50%{transform:translate(0,0) rotate(0)}75%{transform:translate(0,-1.5px) rotate(1.6deg)}}
    @keyframes trR{0%,100%{transform:translate(0,0) rotate(0)}25%{transform:translate(0,-1.5px) rotate(1.6deg)}50%{transform:translate(0,0) rotate(0)}75%{transform:translate(0,-1.5px) rotate(-1.6deg)}}
    @keyframes xPulse{0%,30%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}70%,100%{opacity:.75;transform:scale(1)}}
    @keyframes spkA{0%,38%{opacity:0;transform:scale(.6)}50%{opacity:.9;transform:scale(1.15)}64%,100%{opacity:0;transform:scale(.6)}}
    @keyframes spkB{0%,42%{opacity:0;transform:scale(.6)}54%{opacity:.9;transform:scale(1.1)}66%,100%{opacity:0;transform:scale(.6)}}
    @keyframes coinShine{0%,32%{opacity:.25}44%,58%{opacity:1}76%,100%{opacity:.45}}
    @keyframes checkIn{0%,58%{opacity:0;transform:translateY(8px) scale(.7)}68%,100%{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes lockBody{0%,50%{transform:translateY(0)}55%{transform:translateY(-4px)}62%,100%{transform:translateY(0)}}
    @keyframes shackleL{0%,48%{transform:translate(0,0) rotate(0deg)}58%,100%{transform:translate(-4px,-16px) rotate(-18deg)}}
    @keyframes shackleR{0%,48%{transform:translate(0,0) rotate(0deg)}58%,100%{transform:translate(4px,-16px) rotate(18deg)}}
    @keyframes sealedPulse{0%,48%{opacity:1}58%,100%{opacity:.32}}
    @keyframes ticketMatched{0%,58%{opacity:0}68%,100%{opacity:1}}

    @media (prefers-reduced-motion:reduce){
      #leftTrader,#rightTrader,#coinXLM,#coinUSDC,#coinXLM .coinFace,#coinUSDC .coinFace,#coinXLM .shine,#coinUSDC .shine,#crossX,#sparkA,#sparkB,#matchCheck,#lockL .body,#lockR .body,#lockL .shackle,#lockR .shackle,#leftTicket .sealed,#rightTicket .sealed,#leftTicket .matched,#rightTicket .matched{animation:none}
      #coinXLM{transform:translate(282px,-42px)}#coinUSDC{transform:translate(-282px,42px)}
      #crossX{opacity:.82;transform:scale(1)}#sparkA,#sparkB{opacity:0}
      #matchCheck{opacity:1;transform:translateY(0) scale(1)}
      #lockL .shackle{transform:translate(-4px,-16px) rotate(-18deg)}#lockR .shackle{transform:translate(4px,-16px) rotate(18deg)}
      #leftTicket .sealed,#rightTicket .sealed{opacity:.32}#leftTicket .matched,#rightTicket .matched{opacity:1}}
  </style>

  <rect width="512" height="192" fill="#0B0E2A"/>
  <rect y="138" width="512" height="54" fill="#141A47"/>
  <rect y="136" width="512" height="4" fill="#7A5CFF"/>
  <rect x="0" y="0" width="512" height="6" fill="#141A47"/>
  <rect x="20" y="170" width="78" height="6" fill="#2BFF88"/>
  <rect x="414" y="170" width="78" height="6" fill="#2BFF88"/>
  <rect x="218" y="170" width="76" height="6" fill="#FFD23F"/>

  <g opacity=".32">
    <rect x="176" y="52" width="10" height="4" fill="#FFE98A"/>
    <rect x="190" y="52" width="18" height="4" fill="#FFE98A"/>
    <rect x="306" y="48" width="10" height="4" fill="#2CE8F5"/>
    <rect x="322" y="48" width="18" height="4" fill="#2CE8F5"/>
    <rect x="176" y="118" width="16" height="4" fill="#FF2E88"/>
    <rect x="318" y="116" width="18" height="4" fill="#2CE8F5"/>
    <rect x="236" y="34" width="8" height="8" fill="#7A5CFF"/>
    <rect x="270" y="34" width="8" height="8" fill="#7A5CFF"/>
  </g>

  <g id="leftTrader">
    <rect x="24" y="60" width="8" height="22" fill="#FDF6E3"/>
    <rect x="32" y="54" width="24" height="34" fill="#FDF6E3"/>
    <rect x="56" y="62" width="8" height="20" fill="#FDF6E3"/>
    <rect x="30" y="46" width="30" height="8" fill="#7A5CFF"/>
