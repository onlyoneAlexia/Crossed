    <rect x="68" y="94" width="28" height="10" fill="#FDF6E3"/>
    <rect x="90" y="98" width="8" height="6" fill="#FFD23F"/>
    <rect x="20" y="134" width="14" height="30" fill="#05060F"/>
    <rect x="50" y="134" width="14" height="30" fill="#05060F"/>
    <rect x="18" y="164" width="22" height="6" fill="#7A5CFF"/>
    <rect x="48" y="164" width="22" height="6" fill="#7A5CFF"/>
  </g>

  <g id="rightTrader">
    <rect x="456" y="60" width="8" height="22" fill="#FDF6E3"/>
    <rect x="432" y="54" width="24" height="34" fill="#FDF6E3"/>
    <rect x="424" y="62" width="8" height="20" fill="#FDF6E3"/>
    <rect x="428" y="46" width="30" height="8" fill="#7A5CFF"/>
    <rect x="434" y="40" width="20" height="8" fill="#7A5CFF"/>
    <rect x="436" y="66" width="4" height="6" fill="#05060F"/>
    <rect x="432" y="82" width="18" height="4" fill="#FF2E88"/>
    <rect x="424" y="88" width="50" height="46" fill="#FF2E88"/>
    <rect x="430" y="88" width="38" height="8" fill="#7A5CFF"/>
    <rect x="396" y="94" width="28" height="10" fill="#FDF6E3"/>
    <rect x="394" y="98" width="8" height="6" fill="#FFD23F"/>
    <rect x="428" y="134" width="14" height="30" fill="#05060F"/>
    <rect x="458" y="134" width="14" height="30" fill="#05060F"/>
    <rect x="422" y="164" width="22" height="6" fill="#7A5CFF"/>
    <rect x="452" y="164" width="22" height="6" fill="#7A5CFF"/>
  </g>

  <g id="leftTicket">
