      </g>
      <g class="body">
        <rect x="0" y="28" width="50" height="30" fill="#FFD23F"/>
        <rect x="4" y="24" width="42" height="6" fill="#FFE98A"/>
        <rect x="20" y="40" width="12" height="10" fill="#05060F"/>
        <rect x="24" y="50" width="4" height="6" fill="#05060F"/>
      </g>
    </g>
  </g>

  <g id="crossX">
    <rect x="222" y="48" width="14" height="10" fill="#7A5CFF"/>
    <rect x="276" y="48" width="14" height="10" fill="#7A5CFF"/>
    <rect x="234" y="58" width="14" height="10" fill="#FFD23F"/>
    <rect x="264" y="58" width="14" height="10" fill="#FFD23F"/>
    <rect x="246" y="68" width="20" height="10" fill="#2BFF88"/>
    <rect x="250" y="78" width="12" height="10" fill="#2BFF88"/>
    <rect x="250" y="88" width="12" height="14" fill="#2CE8F5"/>
    <rect x="246" y="102" width="20" height="10" fill="#2BFF88"/>
    <rect x="234" y="112" width="14" height="10" fill="#FFD23F"/>
    <rect x="264" y="112" width="14" height="10" fill="#FFD23F"/>
    <rect x="222" y="122" width="14" height="10" fill="#7A5CFF"/>
    <rect x="276" y="122" width="14" height="10" fill="#7A5CFF"/>
    <rect x="238" y="78" width="10" height="8" fill="#FF2E88"/>
    <rect x="264" y="94" width="10" height="8" fill="#FF2E88"/>
  </g>

  <g id="sparkA">
    <rect x="210" y="82" width="8" height="8" fill="#FDF6E3"/>
    <rect x="204" y="88" width="20" height="4" fill="#FDF6E3"/>
    <rect x="212" y="76" width="4" height="20" fill="#FDF6E3"/>
  </g>
  <g id="sparkB">
    <rect x="294" y="92" width="8" height="8" fill="#FDF6E3"/>
    <rect x="288" y="98" width="20" height="4" fill="#FDF6E3"/>
    <rect x="296" y="86" width="4" height="20" fill="#FDF6E3"/>
  </g>

  <g id="coinXLM">
   <g transform="translate(92 104)">
    <g class="coinFace">
      <image href="/assets/tokens/xlm-coin32.svg" xlink:href="/assets/tokens/xlm-coin32.svg" x="0" y="0" width="48" height="48" style="image-rendering:pixelated"/>
    </g>
   </g>
  </g>

  <g id="coinUSDC">
   <g transform="translate(372 58)">
    <g class="coinFace">
      <image href="/assets/tokens/usdc-coin32.svg" xlink:href="/assets/tokens/usdc-coin32.svg" x="0" y="0" width="48" height="48" style="image-rendering:pixelated"/>
    </g>
