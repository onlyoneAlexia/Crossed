    <rect x="86" y="24" width="84" height="8" fill="#FF2E88"/>
    <rect x="92" y="38" width="52" height="6" fill="#FDF6E3" opacity=".16"/>
    <rect x="92" y="50" width="20" height="6" fill="#FDF6E3" opacity=".18"/>
    <rect x="122" y="50" width="30" height="6" fill="#FDF6E3" opacity=".18"/>
    <text class="sealed" x="110" y="62" font-size="18" fill="#FDF6E3">?</text>
    <g class="matched">
      <rect x="146" y="48" width="6" height="6" fill="#2BFF88"/>
      <rect x="152" y="54" width="6" height="6" fill="#2BFF88"/>
